name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    name: Test
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Xcode version
        run: xcodebuild -version

      - name: Run CI test script
        run: bash scripts/test-ci.sh

  release:
    name: Package and Publish
    needs: test
    runs-on: macos-26
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Xcode version
        run: xcodebuild -version

      - name: Build release artifacts
        run: bash scripts/build-release.sh --version "${GITHUB_REF_NAME}" --dist-root dist

      - name: Package release archive
        run: bash scripts/package-release.sh --dist-root dist --output-dir release

      - name: Publish Draft GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          files: release/CodexReviewMCP-macos-arm64.zip
          draft: true
          generate_release_notes: true
